{% extends 'base.html' %}
{% block title %}Giriş – Yeraltı İmparatorluğu{% endblock %}
{% block content_auth %}
<div class="auth-wrap">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:56px;margin-bottom:8px;">🔫</div>
      <div style="font-size:24px;font-weight:900;color:var(--red);letter-spacing:-0.5px;">YERALTI İMPARATORLUĞU</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px;">"Şehrin altında kurallar farklıdır."</div>
    </div>
    <div class="kart">
      <div class="kart-baslik">Hesabına Giriş Yap</div>
      <form method="POST">
        <div class="form-grup">
          <label>Kullanıcı Adı</label>
          <input class="form-input" name="kullanici_adi" placeholder="reis_adi" required autofocus>
        </div>
        <div class="form-grup">
          <label>Şifre</label>
          <input class="form-input" type="password" name="sifre" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-kirmizi btn-tam">[ 🔫 GİRİŞ YAP ]</button>
      </form>
    </div>
    <div style="text-align:center;margin-top:1rem;font-size:13px;color:var(--text3);">
      Hesabın yok mu? <a href="/kayit" style="color:var(--gold);">Kayıt Ol</a>
    </div>
  </div>
</div>
{% endblock %}
