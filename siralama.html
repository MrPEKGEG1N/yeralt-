{% extends 'base.html' %}
{% block title %}Kayıt – Yeraltı İmparatorluğu{% endblock %}
{% block content_auth %}
<div class="auth-wrap">
  <div class="auth-box">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:56px;margin-bottom:8px;">🔫</div>
      <div style="font-size:24px;font-weight:900;color:var(--red);">YERALTI İMPARATORLUĞU</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px;">"Yeni bir reis doğuyor."</div>
    </div>
    <div class="kart">
      <div class="kart-baslik">Yeni Hesap Oluştur</div>
      <form method="POST">
        <div class="form-grup">
          <label>Kullanıcı Adı</label>
          <input class="form-input" name="kullanici_adi" placeholder="sokak_reisi" required autofocus>
        </div>
        <div class="form-grup">
          <label>E-posta Adresi</label>
          <input class="form-input" type="email" name="email" placeholder="reis@mail.com" required>
        </div>
        <div class="form-grup">
          <label>Şifre (min. 6 karakter)</label>
          <input class="form-input" type="password" name="sifre" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-altin btn-tam">[ 👑 MAFYAYA KATIL ]</button>
      </form>
    </div>
    <div style="text-align:center;margin-top:1rem;font-size:13px;color:var(--text3);">
      Zaten üye misin? <a href="/giris" style="color:var(--gold);">Giriş Yap</a>
    </div>
  </div>
</div>
{% endblock %}
